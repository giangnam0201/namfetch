name: build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: namfetch
  APP_VERSION: "1.0.0"

jobs:
  # --------------------------------------------------------------------- #
  # Smoke test                                                            #
  # --------------------------------------------------------------------- #
  run:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python namfetch.py

  # --------------------------------------------------------------------- #
  # Windows: .exe + .zip                                                   #
  # --------------------------------------------------------------------- #
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name ${{ env.APP_NAME }} namfetch.py
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/${{ env.APP_NAME }}.exe -DestinationPath dist/${{ env.APP_NAME }}-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: |
            dist/${{ env.APP_NAME }}.exe
            dist/${{ env.APP_NAME }}-windows-x64.zip

  # --------------------------------------------------------------------- #
  # Linux: binary + .deb + .AppImage + .tar.gz                            #
  # --------------------------------------------------------------------- #
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Build binary with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name $APP_NAME namfetch.py

      - name: Build .tar.gz
        run: |
          mkdir -p out
          tar -C dist -czf out/${APP_NAME}-linux-x64.tar.gz $APP_NAME

      - name: Build .deb (fpm)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm
          mkdir -p pkg/usr/local/bin
          cp dist/$APP_NAME pkg/usr/local/bin/$APP_NAME
          chmod +x pkg/usr/local/bin/$APP_NAME
          fpm -s dir -t deb \
            -n $APP_NAME \
            -v $APP_VERSION \
            -C pkg \
            --description "Cross-platform neofetch-like system info tool" \
            --license MIT \
            --maintainer "namfetch@example.com" \
            --url "https://github.com/${{ github.repository }}" \
            -p out/${APP_NAME}_${APP_VERSION}_amd64.deb \
            usr

      - name: Build .AppImage
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick file
          mkdir -p AppDir/usr/bin
          cp dist/$APP_NAME AppDir/usr/bin/$APP_NAME
          cat > AppDir/AppRun <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/namfetch" "$@"
          EOF
          chmod +x AppDir/AppRun
          cat > AppDir/${APP_NAME}.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=namfetch
          Exec=namfetch
          Icon=${APP_NAME}
          Categories=Utility;
          Terminal=true
          EOF
          # Solid-color icon — avoids ImageMagick font-policy crashes.
          convert -size 256x256 xc:'#89b4fa' AppDir/${APP_NAME}.png
          curl -sSL -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            AppDir out/${APP_NAME}-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux
          path: |
            dist/${{ env.APP_NAME }}
            out/*

  # --------------------------------------------------------------------- #
  # macOS: binary + .pkg + .dmg                                            #
  # --------------------------------------------------------------------- #
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Build binary with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name $APP_NAME namfetch.py

      - name: Build .pkg
        run: |
          mkdir -p out pkg-root/usr/local/bin
          cp dist/$APP_NAME pkg-root/usr/local/bin/$APP_NAME
          chmod +x pkg-root/usr/local/bin/$APP_NAME
          pkgbuild --root pkg-root \
            --identifier com.namfetch.cli \
            --version $APP_VERSION \
            --install-location / \
            out/${APP_NAME}-${APP_VERSION}.pkg

      - name: Build .dmg
        run: |
          mkdir -p dmg-root
          cp dist/$APP_NAME dmg-root/$APP_NAME
          hdiutil create -volname "$APP_NAME" \
            -srcfolder dmg-root \
            -ov -format UDZO \
            out/${APP_NAME}-${APP_VERSION}.dmg

      - name: Build .tar.gz
        run: tar -C dist -czf out/${APP_NAME}-macos-universal.tar.gz $APP_NAME

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos
          path: |
            dist/${{ env.APP_NAME }}
            out/*

  # --------------------------------------------------------------------- #
  # Android: .apk via Buildozer (manual install — no flaky Docker action)  #
  # --------------------------------------------------------------------- #
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Stage namfetch into android/
        run: cp namfetch.py android/namfetch.py

      - name: Install Buildozer system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip openjdk-17-jdk-headless \
            autoconf automake libtool pkg-config zlib1g-dev libffi-dev \
            libssl-dev libsqlite3-dev libbz2-dev libreadline-dev \
            libncurses-dev liblzma-dev cmake ccache

      - name: Install Buildozer
        run: pip install --upgrade buildozer "cython<3.0"

      - name: Cache Buildozer global cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            android/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK
        working-directory: android
        run: buildozer android debug

      - name: Collect APK
        run: |
          mkdir -p out
          cp android/bin/*.apk out/${APP_NAME}-${APP_VERSION}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android
          path: out/*.apk

  # --------------------------------------------------------------------- #
  # iOS: real (unsigned) .ipa via kivy-ios                                 #
  #      Install on device via AltStore / Sideloadly / Xcode personal team #
  # --------------------------------------------------------------------- #
  ios:
    runs-on: macos-latest
    timeout-minutes: 120
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install build deps
        run: |
          brew install autoconf automake libtool pkg-config
          pip install --upgrade pip
          pip install kivy-ios "cython<3.0"

      - name: Cache kivy-ios toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/kivy-ios
            dist
          key: kivy-ios-${{ runner.os }}-${{ runner.arch }}-py311-v1

      - name: Build Python + Kivy for iOS
        run: |
          toolchain build python3 kivy openssl libffi || \
          toolchain build python3 kivy openssl libffi  # one retry

      - name: Stage source for kivy-ios
        run: |
          mkdir -p ios-src
          cp namfetch.py ios-src/
          cp android/main.py ios-src/main.py

      - name: Create Xcode project
        run: |
          toolchain create $APP_NAME ios-src

      - name: Build unsigned .app
        working-directory: ${{ env.APP_NAME }}-ios
        run: |
          xcodebuild \
            -project ${APP_NAME}.xcodeproj \
            -scheme ${APP_NAME} \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER=

      - name: Package unsigned .ipa
        run: |
          mkdir -p out Payload
          APP_PATH="${APP_NAME}-ios/build/Build/Products/Release-iphoneos/${APP_NAME}.app"
          cp -r "$APP_PATH" Payload/
          zip -qr out/${APP_NAME}-${APP_VERSION}-ios-unsigned.ipa Payload
          ls -la out/

      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('out/*.ipa') != ''
        with:
          name: ${{ env.APP_NAME }}-ios
          path: out/*.ipa

  # --------------------------------------------------------------------- #
  # Release: rolling "latest" on main pushes, versioned on tags            #
  # --------------------------------------------------------------------- #
  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [windows, linux, macos, android, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.exe" -o -name "*.zip" -o -name "*.deb" -o \
            -name "*.AppImage" -o -name "*.tar.gz" -o \
            -name "*.pkg" -o -name "*.dmg" -o -name "*.apk" -o \
            -name "*.ipa" \
          \) -exec cp {} release/ \;
          echo "--- artifacts to release ---"
          ls -la release/

      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=namfetch ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "name=Latest build (main)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh rolling "latest" release
        if: steps.meta.outputs.tag == 'latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag --repo ${{ github.repository }} || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
